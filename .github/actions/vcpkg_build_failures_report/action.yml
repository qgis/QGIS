name: Vcpkg build failures report
description: >-
  Scans a vcpkg buildtrees directory for failed port builds and surfaces a
  curated summary into the GitHub Actions step summary, as workflow
  annotations, and (optionally) as a sticky PR comment section.

inputs:
  buildtrees-dir:
    description: Path to the vcpkg buildtrees directory.
    required: true
    type: string
  triplet:
    description: Triplet label used in headings, marker, and emoji selection.
    required: true
    type: string
  pr:
    description: >-
      Pull request number. If set, a sticky-comment artifact is uploaded so the
      build_artifact_comment workflow can update the sticky comment with this
      section (marker `vcpkg-failures-<triplet>`).
    required: false
    default: ''
    type: string
  artifact-url:
    description: Optional URL to the uploaded build-logs-<triplet> artifact.
    required: false
    default: ''
    type: string
  diff-report-json:
    description: >-
      Optional path to a JSON file with `added`/`updated` port lists used to
      tag each failure as updated/unchanged in this PR.
    required: false
    default: ''
    type: string

outputs:
  failed-ports:
    description: Comma-separated list of port names that failed.
    value: ${{ steps.parse.outputs.failed-ports }}
  failure-count:
    description: Number of failing ports detected.
    value: ${{ steps.parse.outputs.failure-count }}

runs:
  using: composite
  steps:
    - name: Parse vcpkg buildtrees for failures
      id: parse
      shell: bash
      env:
        BUILDTREES_DIR: ${{ inputs.buildtrees-dir }}
      run: |
        set -euo pipefail
        # Use $RUNNER_TEMP rather than /tmp because Git Bash on Windows can
        # map /tmp differently between separate `shell: bash` invocations.
        out_json="${RUNNER_TEMP//\\//}/vcpkg-failures.json"
        echo "json-path=${out_json}" >> "$GITHUB_OUTPUT"

        echo "Scanning buildtrees: ${BUILDTREES_DIR}"
        ls -1 "${BUILDTREES_DIR}" 2>/dev/null | head -20 || \
          echo "(buildtrees directory does not exist or is empty)"

        python3 "${GITHUB_ACTION_PATH}/parse_failures.py" \
          "${BUILDTREES_DIR}" \
          --output "${out_json}"

        count=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1]))))" "${out_json}")
        ports=$(python3 -c "import json,sys; print(','.join(f['port'] for f in json.load(open(sys.argv[1]))))" "${out_json}")
        echo "failure-count=${count}" >> "$GITHUB_OUTPUT"
        echo "failed-ports=${ports}" >> "$GITHUB_OUTPUT"
        echo "Detected ${count} vcpkg port build failure(s): ${ports:-<none>}"

    - name: Render markdown report
      id: render
      shell: bash
      env:
        TRIPLET: ${{ inputs.triplet }}
        ARTIFACT_URL: ${{ inputs.artifact-url }}
        DIFF_REPORT: ${{ inputs.diff-report-json }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        FAILURES_JSON: ${{ steps.parse.outputs.json-path }}
      run: |
        set -euo pipefail
        out_md="${RUNNER_TEMP//\\//}/vcpkg-failures.md"
        echo "md-path=${out_md}" >> "$GITHUB_OUTPUT"

        args=( "${FAILURES_JSON}" --triplet "${TRIPLET}" --run-url "${RUN_URL}" --output "${out_md}" )
        if [ -n "${ARTIFACT_URL}" ]; then
          args+=( --artifact-url "${ARTIFACT_URL}" )
        fi
        if [ -n "${DIFF_REPORT}" ] && [ -f "${DIFF_REPORT}" ]; then
          args+=( --diff-report "${DIFF_REPORT}" )
        fi
        python3 "${GITHUB_ACTION_PATH}/format_report.py" "${args[@]}"

        # Expose the rendered markdown as a multi-line step output so the
        # post_sticky_comment step can consume it.
        {
          echo "body<<__VCPKG_FAILURES_EOF__"
          cat "${out_md}"
          echo "__VCPKG_FAILURES_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Append report to step summary
      shell: bash
      env:
        MD_PATH: ${{ steps.render.outputs.md-path }}
      run: |
        {
          echo ""
          echo "## 🧮 vcpkg build failures"
          echo ""
          cat "${MD_PATH}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Emit workflow annotations for failing ports
      if: steps.parse.outputs.failure-count != '0'
      shell: bash
      env:
        TRIPLET: ${{ inputs.triplet }}
        FAILURES_JSON: ${{ steps.parse.outputs.json-path }}
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import json, os
        triplet = os.environ["TRIPLET"]
        path = os.environ["FAILURES_JSON"]
        for f in json.load(open(path)):
            print(f"::error file=vcpkg/vcpkg.json,title=vcpkg port build failure::"
                  f"{f['port']} failed on {triplet}")
        PY

    - name: Schedule sticky comment update
      if: inputs.pr != ''
      uses: ./.github/actions/post_sticky_comment
      with:
        marker: vcpkg-failures-${{ inputs.triplet }}
        body: ${{ steps.render.outputs.body }}
        pr: ${{ inputs.pr }}
        key: vcpkg-failures-${{ inputs.triplet }}
