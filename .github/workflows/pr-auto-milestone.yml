name: 📅 Auto set milestone on PR

# This workflow automatically assigns milestones to newly opened PRs based on:
# - The target branch (master vs release branch)
# - The latest released version found in git tags
# - Master PRs get milestone +2 minor versions from latest (e.g., 4.0 latest -> 4.2 milestone)
# - Release branch PRs get milestone +0.1 patch version (e.g., 4.0.0 latest -> 4.0.1 milestone)
# - Works for both 3.x and 4.x release branches (major version auto-detected from branch name)

on:
  workflow_call:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened

permissions:
  contents: read

env:
  QGIS_MAJOR_VERSION_MASTER: 4  # Major version for master branch (update when bumping to 5.x)

jobs:
  pr-without-milestones:
    runs-on: ubuntu-latest
    if: github.repository == 'qgis/QGIS'
    permissions:
      issues: write
      pull-requests: write
    steps:
      # Fetch data from GitHub API:
      # - Recent open PRs and their milestones
      # - Existing milestones
      # - Recent git tags (to determine latest released version)
      - uses: octokit/graphql-action@v2.x
        id: graphql_request
        with:
          query: |
            query {
              repository(owner: "qgis", name: "QGIS") {
                pullRequests(states: OPEN, last: 100) {
                  edges {
                    node {
                      number
                      title
                      milestone {
                        number
                      }
                      baseRef {
                        name
                      }
                    }
                  }
                }
                milestones(orderBy: {field: CREATED_AT, direction: DESC}, first: 50) {
                  edges {
                    node {
                      title
                      number
                    }
                  }
                }
                refs(refPrefix: "refs/tags/", orderBy: {field: TAG_COMMIT_DATE, direction: DESC}, first: 30) {
                  edges {
                    node {
                      name
                    }
                  }
                }
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Process all PRs without milestones and assign appropriate milestones
      - name: Process PRs and assign milestones
        env:
          JSON_DATA: ${{ steps.graphql_request.outputs.data }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # get PRs without milestones
          PRS_TO_PROCESS=$(echo "${JSON_DATA}" | jq -c '.repository.pullRequests.edges[] | select( .node.milestone.number | not ) | {number: .node.number, branch: .node.baseRef.name}')

          NUMBER_OF_PRS=$(echo "${PRS_TO_PROCESS}" | jq -s '. | length')
          echo "NUMBER_OF_PRS: ${NUMBER_OF_PRS}"
          
          # early exit if no PRs to process
          [[ ${NUMBER_OF_PRS} == 0 ]] && echo "No PRs without milestones found" && exit 0

          # Process each PR
          echo "${PRS_TO_PROCESS}" | while IFS= read -r pr_data; do
            PR_NUMBER=$(echo "${pr_data}" | jq -r '.number')
            BASE_BRANCH=$(echo "${pr_data}" | jq -r '.branch')
            
            echo "========================================="
            echo "Processing PR #${PR_NUMBER} (branch: ${BASE_BRANCH})"
            
            # Extract major and minor version from branch name
            # Examples: master => major=4 (from env), minor=empty
            #           release-3_38 => major=3, minor=_38
            #           release-4_0 => major=4, minor=_0
            BRANCH_MAJOR_VERSION=$(echo ${BASE_BRANCH} | sed -r -e 's/^release-([0-9])_[0-9]+/\1/;t;d')
            if [[ -z ${BRANCH_MAJOR_VERSION} ]]; then
              # Master branch - use the environment variable
              QGIS_MAJOR_VERSION=${QGIS_MAJOR_VERSION_MASTER}
            else
              # Release branch - use the detected major version
              QGIS_MAJOR_VERSION=${BRANCH_MAJOR_VERSION}
            fi

            # Extract minor version from release branch name
            # Examples: master => empty, release-3_38 => _38, release-4_0 => _0, release-4_2 => _2
            MINOR_VERSION=$(echo ${BASE_BRANCH} | sed -r -e 's/^release-[0-9]_([0-9]+)/_\1/;t;d')

            # Find the highest released version from git tags matching the target branch
            MAX_RELEASE=$(echo "${JSON_DATA}" | jq ".repository.refs.edges[].node.name | select( . | test(\"^final-${QGIS_MAJOR_VERSION}${MINOR_VERSION}\") ) | sub(\"^final-${QGIS_MAJOR_VERSION}_(?<m>[0-9]+)_(?<p>.)\"; .m+\".\"+.p) | tonumber" | jq -s '. | max')

            # Calculate milestone version based on latest release:
            # - Master branch: skip one minor version (e.g., 3.38 released -> 3.40 milestone, 4.0 released -> 4.2 milestone)
            # - Release branch: increment patch version (e.g., 3.38.0 released -> 3.38.1 milestone, 4.0.0 released -> 4.0.1 milestone)
            INCREASE_OPERATION=$([[ -z ${MINOR_VERSION} ]] && echo "${MAX_RELEASE%.*} + 2.0" || echo "${MAX_RELEASE} + 0.1" )
            MILESTONE_VERSION=$(printf "%.1f" $(echo "${INCREASE_OPERATION}" | bc))
            MILESTONE_TITLE="${QGIS_MAJOR_VERSION}.${MILESTONE_VERSION}"
            
            echo "Target milestone: ${MILESTONE_TITLE}"

            # Check if milestone exists in GitHub
            MILESTONE_NUMBER=$(echo "${JSON_DATA}" | jq ".repository.milestones.edges[] | select( .node.title == \"${MILESTONE_TITLE}\" ) | .node.number")
            
            if [[ -z ${MILESTONE_NUMBER} ]]; then
              echo "Creating new milestone: ${MILESTONE_TITLE}"
              # Create milestone using GitHub API
              CREATE_RESPONSE=$(curl -s -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/qgis/QGIS/milestones" \
                -d "{\"title\":\"${MILESTONE_TITLE}\"}")
              
              MILESTONE_NUMBER=$(echo "${CREATE_RESPONSE}" | jq -r '.number')
              
              if [[ ${MILESTONE_NUMBER} == "null" ]] || [[ -z ${MILESTONE_NUMBER} ]]; then
                echo "Error creating milestone. Response: ${CREATE_RESPONSE}"
                continue
              fi
              
              echo "Created milestone with number: ${MILESTONE_NUMBER}"
            else
              echo "Found existing milestone number: ${MILESTONE_NUMBER}"
            fi

            # Assign milestone to PR
            echo "Assigning milestone ${MILESTONE_NUMBER} to PR #${PR_NUMBER}"
            ASSIGN_RESPONSE=$(curl -s -X PATCH \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/qgis/QGIS/issues/${PR_NUMBER}" \
              -d "{\"milestone\":${MILESTONE_NUMBER}}")
            
            ASSIGNED_MILESTONE=$(echo "${ASSIGN_RESPONSE}" | jq -r '.milestone.number')
            
            if [[ ${ASSIGNED_MILESTONE} == ${MILESTONE_NUMBER} ]]; then
              echo "✓ Successfully assigned milestone ${MILESTONE_TITLE} to PR #${PR_NUMBER}"
            else
              echo "✗ Failed to assign milestone to PR #${PR_NUMBER}. Response: ${ASSIGN_RESPONSE}"
            fi
          done
