name: Sign release assets

on:
  push:
    branches:
      - master
    tags:
      - 'strata-v*'
  workflow_run:
    workflows:
      - '🍎 Build - MacOS Qt6'
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sign, for example strata-v1.3.0
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  sign-release-assets:
    name: Sign release assets
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${TAG:-}"
          if [ -z "${TAG}" ]; then
            if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/strata-v* ]]; then
              TAG="${GITHUB_REF#refs/tags/}"
            elif [ "${{ github.event_name }}" = "workflow_run" ]; then
              HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
              if [[ "${HEAD_BRANCH}" == strata-v* ]]; then
                TAG="${HEAD_BRANCH}"
              else
                echo "Skipping signing for non-release workflow run (${HEAD_BRANCH})."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            else
              TAG=$(gh release list --repo "${GITHUB_REPOSITORY}" --limit 1 --json tagName --jq '.[0].tagName')
            fi
          fi

          case "${TAG}" in
            strata-v*) ;;
            *)
              echo "::error::Release tag must start with strata-v: ${TAG}"
              exit 1
              ;;
          esac

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${TAG}"

      - name: Wait for required release binaries
        if: steps.resolve-tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.resolve-tag.outputs.tag }}"
          for attempt in $(seq 1 120); do
            mapfile -t assets < <(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')
            has_appimage=0
            has_dmg=0
            has_exe=0
            has_zip=0
            for asset in "${assets[@]}"; do
              case "${asset}" in
                *.AppImage) has_appimage=1 ;;
                *.dmg) has_dmg=1 ;;
                *.exe) has_exe=1 ;;
                *-win64.zip) has_zip=1 ;;
              esac
            done
            if [ "${has_appimage}" -eq 1 ] && [ "${has_dmg}" -eq 1 ] && [ "${has_exe}" -eq 1 ] && [ "${has_zip}" -eq 1 ]; then
              echo "All required release binaries are present."
              exit 0
            fi
            echo "Attempt ${attempt}/120: waiting for release binaries (appimage=${has_appimage}, dmg=${has_dmg}, exe=${has_exe}, zip=${has_zip})"
            sleep 300
          done
          echo "::error::Timed out waiting for release binaries on ${TAG}"
          exit 1

      - name: Validate release tag
        if: steps.resolve-tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Skip when signatures already exist
        if: steps.resolve-tag.outputs.skip != 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.resolve-tag.outputs.tag }}"
          mapfile -t assets < <(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')
          missing=0
          for required in "*.AppImage" "*.dmg" "*.exe" "*-win64.zip"; do
            case "${required}" in
              *.AppImage) pattern='\.AppImage$' ;;
              *.dmg) pattern='\.dmg$' ;;
              *.exe) pattern='\.exe$' ;;
              *-win64.zip) pattern='-win64\.zip$' ;;
            esac
            base=""
            for asset in "${assets[@]}"; do
              if [[ "${asset}" =~ ${pattern} ]]; then
                base="${asset}"
                break
              fi
            done
            if [ -z "${base}" ]; then
              missing=1
              break
            fi
            if ! printf '%s\n' "${assets[@]}" | grep -qx "${base}.sigstore.json"; then
              missing=1
              break
            fi
          done
          if [ "${missing}" -eq 0 ]; then
            echo "All required sigstore bundles already exist for ${TAG}."
            echo "SKIP_SIGNING=true" >> "$GITHUB_ENV"
          fi

      - name: Install cosign
        if: steps.resolve-tag.outputs.skip != 'true' && env.SKIP_SIGNING != 'true'
        uses: sigstore/cosign-installer@v3.9.2

      - name: Download release assets
        if: steps.resolve-tag.outputs.skip != 'true' && env.SKIP_SIGNING != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets release-signatures
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir release-assets \
            --clobber

          find release-assets -maxdepth 1 -type f -print | sort

      - name: Sign and verify release assets
        if: steps.resolve-tag.outputs.skip != 'true' && env.SKIP_SIGNING != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t appimages < <(find release-assets -maxdepth 1 -type f -name '*.AppImage' | sort)
          mapfile -t dmgs < <(find release-assets -maxdepth 1 -type f -name '*.dmg' | sort)
          mapfile -t exes < <(find release-assets -maxdepth 1 -type f -name '*.exe' | sort)
          mapfile -t zips < <(find release-assets -maxdepth 1 -type f -name '*-win64.zip' | sort)

          missing=0
          if [ "${#appimages[@]}" -eq 0 ]; then
            echo "::error::Missing Linux AppImage asset"
            missing=1
          fi
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "::error::Missing macOS DMG asset"
            missing=1
          fi
          if [ "${#exes[@]}" -eq 0 ]; then
            echo "::error::Missing Windows installer EXE asset"
            missing=1
          fi
          if [ "${#zips[@]}" -eq 0 ]; then
            echo "::error::Missing Windows portable ZIP asset"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          targets=("${appimages[@]}" "${dmgs[@]}" "${exes[@]}" "${zips[@]}")
          identity="https://github.com/${GITHUB_WORKFLOW_REF}"

          for file in "${targets[@]}"; do
            base="$(basename "${file}")"
            checksum="release-signatures/${base}.sha256"
            bundle="release-signatures/${base}.sigstore.json"

            (
              cd release-assets
              sha256sum "${base}"
            ) > "${checksum}"

            cosign sign-blob --yes \
              --bundle "${bundle}" \
              "${file}"

            (
              cd release-assets
              sha256sum -c "../${checksum}"
            )

            cosign verify-blob \
              --bundle "${bundle}" \
              --certificate-identity "${identity}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${file}"
          done

          {
            echo "### Signed release assets"
            for file in "${targets[@]}"; do
              echo "- $(basename "${file}")"
            done
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload signature assets
        if: steps.resolve-tag.outputs.skip != 'true' && env.SKIP_SIGNING != 'true'
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "${TAG}" release-signatures/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
