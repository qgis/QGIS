---
name: 🧮 Vcpkg report
on:
  pull_request:
    paths:
      - 'vcpkg/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  vcpkg-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

        with:
          fetch-depth: 200
          persist-credentials: false

      - name: Generate diff report
        id: vcpkg_diff
        uses: ./.github/actions/vcpkg_update_report
        with:
          vcpkg-manifest-dir: vcpkg
          triplet: x64-linux
          features: 3d,auth,bindings,exiv2,gui,opencl,oracle,pdal,proj-data,qtpositioning,quick,recommended-features,server,sfcgal

      - name: Schedule report comment
        uses: ./.github/actions/post_sticky_comment
        if: always() && github.event_name == 'pull_request'
        with:
          marker: vcpkg-report
          body: |
            ### 🧮 Vcpkg update report
            ${{ steps.vcpkg_diff.outputs.report }}
          pr: ${{ github.event.number }}
