---
name: 🧮 Vcpkg report
on:
  pull_request:
    paths:
      - 'vcpkg/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  vcpkg-bump:
    runs-on: ubuntu-latest
    if: github.repository == 'qgis/QGIS'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        with:
          ssh-key: ${{ secrets.VCPKG_BUMPER_KEY }}

      - name: Resolve latest baselines
        id: baselines
        run: python3 scripts/bump_vcpkg_baselines.py vcpkg/vcpkg.json

      - name: Create pull request
        if: steps.baselines.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
          fetch-depth: 30
          persist-credentials: false

      - name: Generate diff report
        id: vcpkg_diff
        uses: ./.github/actions/vcpkg_update_report
        with:
          vcpkg-manifest-dir: vcpkg
          triplet: x64-linux
          features: 3d,auth,bindings,exiv2,gui,opencl,oracle,pdal,proj-data,qtpositioning,quick,recommended-features,server,sfcgal

      - name: Schedule report comment
        uses: ./.github/actions/post_sticky_comment
        if: github.event_name == 'pull_request'
        with:
          branch: vcpkg-bumps/auto
          delete-branch: true
          commit-message: "Bump vcpkg baselines"
          title: "Bump vcpkg baselines"
          body: |
            Automated vcpkg baseline bump.

            ${{ steps.baselines.outputs.summary }}
