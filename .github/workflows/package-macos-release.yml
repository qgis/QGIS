---
name: Package macOS release from artifacts

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID containing strata-app-* macOS artifacts'
        required: true
        type: string
      release_tag:
        description: 'Release tag to upload the DMG to, e.g. strata-v0.1.17'
        required: true
        type: string
      sign_and_notarize:
        description: 'Sign and notarize the DMG'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  package:
    name: Create and upload macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare build env
        run: |
          brew install create-dmg

      - name: Download macOS app artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: strata-app-${{ inputs.release_tag }}-*
          path: artifacts

      - name: Create universal app
        run: |
          set -euo pipefail

          mkdir -p x64 arm64
          rm -rf universal
          ls -laR artifacts | head -80 || true

          X64_TARBALL=$(find artifacts -name 'strata-app-*-x64-osx-dynamic-release.tar.gz' -print -quit)
          ARM64_TARBALL=$(find artifacts -name 'strata-app-*-arm64-osx-dynamic-release.tar.gz' -print -quit)

          if [ -z "$X64_TARBALL" ]; then
            echo "ERROR: x64 app tarball not found under artifacts/"
            exit 1
          fi
          if [ -z "$ARM64_TARBALL" ]; then
            echo "ERROR: arm64 app tarball not found under artifacts/"
            exit 1
          fi

          echo "Extracting $X64_TARBALL to x64/"
          gtar --strip-components=5 -zxf "$X64_TARBALL" -C x64
          echo "Extracting $ARM64_TARBALL to arm64/"
          gtar --strip-components=5 -zxf "$ARM64_TARBALL" -C arm64

          pip install lipomerge
          lipomerge ./x64 ./arm64 universal

          APP_PATH=$(find universal -name '*.app' -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: universal .app bundle not found under universal/"
            find universal -print | head -50
            exit 1
          fi
          if [ "$(dirname "$APP_PATH")" != "universal" ]; then
            echo "Moving $APP_PATH to universal/"
            mv "$APP_PATH" universal/
          fi
          find universal -mindepth 1 -maxdepth 1 ! -name '*.app' -exec rm -rf {} +
          ls -la universal/*.app

      - name: Import Apple code signing certificate
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v5.0.2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: Materialize symlinks in Contents/MacOS
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          # Replace ALL symlinks under Contents/MacOS/ with real copies of
          # their targets. Broken symlinks are removed. Done BEFORE the
          # sign-or-move pass so codesign sees only regular files.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          MATERIALIZED=0
          REMOVED=0
          while IFS= read -r -d '' f; do
            if [ ! -e "$f" ]; then
              echo "Removing broken symlink $f"
              rm -f "$f"
              REMOVED=$((REMOVED + 1))
              continue
            fi
            tmp="${f}.codesign"
            cp -pL "$f" "$tmp"
            rm "$f"
            mv "$tmp" "$f"
            chmod +x "$f" 2>/dev/null || true
            MATERIALIZED=$((MATERIALIZED + 1))
          done < <(find "${APP_PATH}/Contents/MacOS" -maxdepth 1 -type l -print0)
          echo "Materialized ${MATERIALIZED} symlink(s); removed ${REMOVED} broken symlink(s)."

      - name: Remove build metadata from app bundle
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          APP_PATH=$(ls -d universal/*.app | head -n1)
          find "${APP_PATH}" -type d -name "objects-*" -print -prune -exec rm -rf {} +
          find "${APP_PATH}" -type f -name "*.o" -print -delete
          find "${APP_PATH}" -type f -name "*.a" -print -delete
          find "${APP_PATH}" -type f -name "*.prl" -print -delete

      - name: Move Frameworks/lib out of Frameworks
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          # codesign treats every sub-directory of Contents/Frameworks/ as a
          # potential nested bundle. lib/python3.12/ does NOT have a valid
          # framework layout, so the bundle seal aborts with
          # "bundle format unrecognized". We move lib/ under Resources/ and
          # leave a relative symlink at Contents/Frameworks/lib so all
          # runtime paths (rpath, PYTHONHOME, dlopen) keep resolving.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          LIB_DIR="${APP_PATH}/Contents/Frameworks/lib"
          RES_DIR="${APP_PATH}/Contents/Resources/python_runtime"
          if [ -d "${LIB_DIR}" ] && [ ! -L "${LIB_DIR}" ]; then
            mkdir -p "${RES_DIR}"
            mv "${LIB_DIR}" "${RES_DIR}/lib"
            ln -s "../Resources/python_runtime/lib" "${LIB_DIR}"
            echo "Moved Frameworks/lib -> Resources/python_runtime/lib (symlinked back)"
            ls -la "${APP_PATH}/Contents/Frameworks/lib"
          else
            echo "Frameworks/lib not present or already a symlink, skipping."
          fi

      - name: Inventory Contents/MacOS (debug)
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          APP_PATH=$(ls -d universal/*.app | head -n1)
          echo "=== ls -lah Contents/MacOS ==="
          ls -lah "${APP_PATH}/Contents/MacOS" || true
          echo "=== ls -lah Contents/Frameworks (top-level only) ==="
          ls -lah "${APP_PATH}/Contents/Frameworks" || true

      - name: Sign app
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          set -uo pipefail
          APP_PATH=$(ls -d universal/*.app | head -n1)
          APP_NAME=$(basename "${APP_PATH}" .app)
          MAIN_EXEC="${APP_PATH}/Contents/MacOS/${APP_NAME}"
          DEST="${APP_PATH}/Contents/Resources/python"
          mkdir -p "${DEST}"
          echo "Signing ${APP_PATH} (main executable: ${MAIN_EXEC})..."

          # Try to sign $1; if codesign refuses because the file is not a
          # signable Mach-O / bundle, relocate it under Resources/python/. # spellok
          sign_or_move() {
            local f="$1"
            local err
            err=$(codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "$f" 2>&1)
            local rc=$?
            if [ "$rc" -eq 0 ]; then
              return 0
            fi
            if echo "$err" | grep -qE 'is not (a|recognized as) (Mach-O|bundle|signable|valid)|unsupported format|file not in any of the requested architectures|invalid Info.plist|cannot find executable|bundle format unrecognized|the file is empty'; then # spellok
              echo "Not signable, moving out of MacOS/: $f"
              echo "  reason: $err"
              mv "$f" "${DEST}/" || rm -f "$f"
              return 0
            fi
            echo "ERROR signing $f: $err" >&2
            return "$rc"
          }

          # 1. Sign-or-move every file directly under Contents/MacOS/, EXCEPT
          #    the main executable. codesign on the main executable would try
          #    to seal the whole .app and demand that every other component
          #    is already signed, which we have not done yet — so we defer it.
          declare -a MACOS_ENTRIES=()
          while IFS= read -r -d '' f; do
            if [ "$f" = "$MAIN_EXEC" ]; then
              continue
            fi
            MACOS_ENTRIES+=("$f")
          done < <(find "${APP_PATH}/Contents/MacOS" -maxdepth 1 -type f -print0)
          for f in "${MACOS_ENTRIES[@]}"; do
            sign_or_move "$f" || exit 1
          done

          # 2. Sign Mach-O files elsewhere in the bundle (libs, plugins, .so). # spellok
          declare -a OTHER_ENTRIES=()
          while IFS= read -r -d '' f; do
            OTHER_ENTRIES+=("$f")
          done < <(find "${APP_PATH}" -path "${APP_PATH}/Contents/MacOS" -prune -o \
                   \( -type f -o -type l \) -print0)
          for f in "${OTHER_ENTRIES[@]}"; do
            [ -z "$f" ] && continue
            if file -bL "$f" 2>/dev/null | grep -qE 'Mach-O'; then # spellok
              codesign --force --options runtime --timestamp \
                --sign "${MACOS_DEVELOPER_ID}" "$f" || exit 1
            fi
          done

          # 3. Sign each nested bundle wrapper (frameworks, sub-apps).
          while IFS= read -r b; do
            codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "$b" || exit 1
          done < <(find "${APP_PATH}" \( -name "*.framework" -o -name "*.app" \) \
                   -type d -not -path "${APP_PATH}")

          # 4. Sign the main executable now that all sibling components in
          #    Contents/MacOS/ are already signed or relocated.
          if [ -f "${MAIN_EXEC}" ]; then
            codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "${MAIN_EXEC}"
          fi

          # 5. Seal the top-level .app.
          codesign --force --options runtime --timestamp \
            --sign "${MACOS_DEVELOPER_ID}" "${APP_PATH}"

          codesign -dvv "${APP_PATH}" 2>&1 | head -10
          codesign --verify --strict --verbose=2 "${APP_PATH}"
        env:
          MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}

      - name: Verify PyQGIS runtime in signed app
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          APP_PATH=$(ls -d universal/*.app | head -n1)
          python3 scripts/ci/verify_pyqgis_bundle.py --platform macos "${APP_PATH}"

      - name: Create dmg
        run: |
          QGIS_APP_NAME="Strata"
          create-dmg --volname "${QGIS_APP_NAME} Installer" \
            --hide-extension "${QGIS_APP_NAME}.app" \
            --volicon "$(pwd)/images/icons/mac/strata.icns" \
            --background "$(pwd)/platform/macos/installer_background.png" \
            --window-pos 200 120 \
            --window-size 512 320 \
            --icon-size 100 \
            --icon "${QGIS_APP_NAME}.app" 130 160 \
            --app-drop-link 400 155 \
            "${QGIS_APP_NAME}-Installer.dmg" \
            universal/*.app

      - name: Notarize and staple DMG
        if: ${{ inputs.sign_and_notarize && startsWith(inputs.release_tag, 'strata-v') }}
        run: |
          DMG_FILE=$(ls *.dmg | head -n1)
          echo "Notarizing ${DMG_FILE}..."
          xcrun notarytool submit "${DMG_FILE}" \
            --apple-id "${{ secrets.MACOS_APPLE_ID }}" \
            --team-id "${{ secrets.MACOS_APPLE_TEAM_ID }}" \
            --password "${{ secrets.MACOS_APPLE_APP_PASSWORD }}" \
            --wait
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "${DMG_FILE}"; then
              echo "Stapled on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "WARN: stapler failed after 5 attempts. DMG is signed and notarized but ticket is not stapled."
              exit 0
            fi
            sleep 30
          done
          xcrun stapler validate "${DMG_FILE}" || echo "WARN: stapler validate failed but ticket should still be online"

      - name: Upload release assets
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: '*.dmg'
