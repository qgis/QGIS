name: Sync QGIS upstream

on:
  schedule:
    # Target ~02:00 Europe/Rome. GitHub Actions often delays cron jobs by hours;
    # scheduled runs are accepted any time between 02:00 and 09:59 Europe/Rome.
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: qgis-upstream-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Rome
      BASE_BRANCH: ${{ github.event.repository.default_branch || 'master' }}
      UPSTREAM_URL: https://github.com/qgis/QGIS.git
      UPSTREAM_BRANCH: master
      SYNC_BRANCH: automation/qgis-upstream-master
      CONFLICT_ISSUE_TITLE: QGIS upstream sync conflicts
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check schedule window
        id: schedule_window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: running upstream sync."
            exit 0
          fi

          local_hour=$((10#$(TZ=Europe/Rome date +%H)))
          if [ "$local_hour" -ge 2 ] && [ "$local_hour" -le 9 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run within Europe/Rome window 02:00-09:59 (hour ${local_hour})."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Outside sync window; Europe/Rome hour is ${local_hour}."
          fi

      - name: Checkout
        if: steps.schedule_window.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        if: steps.schedule_window.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge QGIS upstream into sync branch
        if: steps.schedule_window.outputs.should_run == 'true'
        shell: bash
        run: scripts/ci/sync-qgis-upstream.sh
