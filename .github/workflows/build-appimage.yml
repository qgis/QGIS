name: 🐧 Build AppImage (Linux)

on:
  push:
    tags:
      - 'strata-v*'
  release:
    types: ['published']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label baked into the AppImage filename (e.g. 0.1.0-test)'
        required: false
        default: 'dev'
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (linux x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#strata-v}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#strata-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
        with:
          max-size: 1G
          key: build-ccache-appimage-${{ github.ref_name }}
          save: ${{ github.event_name == 'push' || github.event_name == 'release' }}

      - name: Build AppImage
        env:
          STRATA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/build-appimage.sh
          scripts/build-appimage.sh

      - name: Install cosign
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/strata-v') }}
        uses: sigstore/cosign-installer@v3.9.2

      - name: Sign AppImage and create checksum
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/strata-v') }}
        shell: bash
        run: |
          set -euo pipefail

          APPIMAGE=$(find . -maxdepth 1 -type f -name 'Strata-*.AppImage' -print -quit)
          if [ -z "${APPIMAGE}" ]; then
            echo "ERROR: AppImage not found"
            exit 1
          fi
          APPIMAGE_NAME=$(basename "${APPIMAGE}")

          sha256sum "${APPIMAGE_NAME}" > "${APPIMAGE_NAME}.sha256"
          cosign sign-blob --yes --bundle "${APPIMAGE_NAME}.sigstore.json" "${APPIMAGE_NAME}"
          cosign verify-blob \
            --bundle "${APPIMAGE_NAME}.sigstore.json" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/build-appimage\\.yml@refs/(tags/strata-v.*|heads/.*)$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${APPIMAGE_NAME}"

      - name: 📤 Upload AppImage as workflow artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: strata-appimage-x86_64
          path: |
            Strata-*.AppImage
            Strata-*.AppImage.sha256
            Strata-*.AppImage.sigstore.json

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/strata-v') }}
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: |
            Strata-*.AppImage
            Strata-*.AppImage.sha256
            Strata-*.AppImage.sigstore.json
