---
name: 🍎 Build - MacOS Qt6
on:
  push:
    branches:
      - master
      - release-*
    tags:
      - 'strata-v*'
  pull_request:
  release:
    types: ['published']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IS_STRATA_RELEASE: ${{ startsWith(github.ref, 'refs/tags/strata-v') || startsWith(github.event.release.tag_name, 'strata-v') }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            triplet: x64-osx-dynamic-release
            deployment-target: "10.15"
            osx-architecture: "x86_64"
          - os: macos-15
            triplet: arm64-osx-dynamic-release
            deployment-target: "11.0"
            osx-architecture: "arm64"
    name: build (macos)
    runs-on: ${{ matrix.os }}
    env:
      FC: gfortran
      GCC_VERSION: 15
      # Use the default vcpkg NuGet binary cache for all builds, including
      # tags. Disabling it ('clear') previously caused tag builds to hit the
      # GitHub Actions 6h job timeout because every dependency had to rebuild
      # from source. The cmake configure step already swallows 409 conflicts
      # via '|| true' when re-pushing already-existing packages.

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # latest
        with:
          # Pin to specific version to avoid rebuilding too often
          # Also helps to avoid spurious build failures like https://github.com/qgis/QGIS/pull/47098
          cmakeVersion: 3.30.4

      - name: 🎡 Setup vcpkg
        id: setup-vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: 🎲 Get artifact ids
        id: workflow-artifact-ids
        uses: ./.github/actions/get-workflow-artifact-ids

      - name: 🔨 Prepare build env
        run: |
          brew install automake bison flex gnu-sed autoconf-archive nasm libtool fdupes swig mono
          echo $(brew --prefix bison)/bin >> $GITHUB_PATH
          echo $(brew --prefix flex)/bin >> $GITHUB_PATH
          echo $(brew --prefix libtool)/bin >> $GITHUB_PATH

      - name: Symlink gfortran (macOS)
        if: matrix.os == 'macos-15'
        run: |
          # make sure gfortran is available
          # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
          # https://github.com/actions/runner-images/issues/3371
          sudo ln -fs /opt/homebrew/bin/gfortran-${GCC_VERSION} /usr/local/bin/gfortran
          sudo mkdir -p /usr/local/gfortran
          sudo ln -sf /opt/homebrew/Cellar/gcc@${GCC_VERSION}/*/lib/gcc/${GCC_VERSION} /usr/local/gfortran/lib

      - name: Symlink gfortran (macOS-intel)
        if: matrix.os == 'macos-15-intel'
        run: |
          # make sure gfortran is available
          # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
          # https://github.com/actions/runner-images/issues/3371
          sudo ln -fs /usr/local/bin/gfortran-${GCC_VERSION} /usr/local/bin/gfortran
          sudo mkdir -p /usr/local/gfortran
          sudo ln -sf /usr/local/Cellar/gcc@${GCC_VERSION}/*/lib/gcc/${GCC_VERSION} /usr/local/gfortran/lib

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: 🍭 Setup XCode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: 🔐 Import Apple code signing certificate
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v5.0.2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          max-size: 500M
          key: build-ccache-${{ matrix.triplet }}-qt6-${{ github.event.pull_request.base.ref || github.ref_name }}
          save: ${{ github.event_name == 'push' }}

      - name: 🛍️ Tune ccache configuration
        shell: bash
        run: |
          # To make ccache work properly with precompiled headers
          ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🌱 Install dependencies and generate project files
        env:
          X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
        run: |
          echo "VCPKG_ROOT: ${VCPKG_ROOT}"

          # vcpkg's qca port does not ship the qcatool binary; QGIS' QCAMacros
          # otherwise insists on it (FATAL_ERROR) which aborts the build.
          # Soften the requirement: skip the FATAL by passing 0 to FIND_QCATOOL.
          # Patch is applied on the runner only — repo file stays untouched.
          sed -i '' 's|FIND_QCATOOL(1)|FIND_QCATOOL(0)|g' cmake/QCAMacros.cmake

          STRATA_VERSION_OPT=""
          if [[ "${{ env.IS_STRATA_RELEASE }}" == "true" ]]; then
            if [[ "${{ github.event_name }}" == "release" ]]; then
              STRATA_TAG="${{ github.event.release.tag_name }}"
            else
              STRATA_TAG="${GITHUB_REF#refs/tags/}"
            fi
            STRATA_VERSION_OPT="-DSTRATA_VERSION=${STRATA_TAG#strata-v}"
          fi

          # Install first only with binarycaching, then deduplicate binaries and replace copies with symlinks.
          # Nuget doesn't understand the symlink concept
          cmake -S . \
                -G Ninja \
                -B build \
                -D "QGIS_APP_NAME=${{ env.IS_STRATA_RELEASE == 'true' && 'Strata' || format('Strata-{0}', steps.workflow-artifact-ids.outputs.display-name) }}" \
                ${STRATA_VERSION_OPT} \
                -D WITH_VCPKG=ON \
                -D WITH_QTWEBENGINE=OFF \
                -D WITH_PYTHON=ON \
                -D WITH_BINDINGS=ON \
                -D WITH_ORACLE=ON \
                -D WITH_GEOGRAPHICLIB=OFF \
                -D WITH_SFCGAL=ON \
                -D WITH_PROJ_DATA=ON \
                -D VCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
                -D VCPKG_HOST_TRIPLET="${{ matrix.triplet }}" \
                -D VCPKG_INSTALL_OPTIONS="--only-binarycaching" \
                -D CMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deployment-target }} \
                -D CMAKE_OSX_ARCHITECTURES=${{ matrix.osx-architecture }} \
                -D ENABLE_UNITY_BUILDS=ON \
                -D MACOS_CODE_SIGN_IDENTITY="${{ secrets.MACOS_DEVELOPER_ID }}" \
                -D "NUGET_USERNAME=${GITHUB_ACTOR}" \
                -D NUGET_SOURCE="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
                -D NUGET_TOKEN=${{ secrets.GITHUB_TOKEN }} || true

                fdupes -q -r -1 build/vcpkg_installed/${{ matrix.triplet }}/lib | grep -E '\.(so|dylib)' | while read line; do master=""; for file in ${line[*]}; do if  [[ "x${master}" == "x" ]]; then master=$file; else rm "${file}"; ln -s $(basename "${master}") "${file}"; fi; done; done

                export DYLD_LIBRARY_PATH="${PWD}/build/vcpkg_installed/${{ matrix.triplet }}/lib:${DYLD_LIBRARY_PATH:-}"
                export DYLD_FALLBACK_LIBRARY_PATH="${PWD}/build/vcpkg_installed/${{ matrix.triplet }}/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}"
                cmake -D VCPKG_INSTALL_OPTIONS="" build

      - name: 📑 Upload vcpkg build logs
        id: upload-build-logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: build-logs-${{ matrix.triplet }}
          path: |
            ${{ env.VCPKG_ROOT }}/buildtrees/**/*.log

      - name: 🧮 Report vcpkg build failures
        if: failure() && github.event_name == 'pull_request'
        uses: ./.github/actions/vcpkg_build_failures_report
        with:
          buildtrees-dir: ${{ env.VCPKG_ROOT }}/buildtrees
          triplet: ${{ matrix.triplet }}
          pr: ${{ github.event.number }}
          artifact-url: ${{ steps.upload-build-logs.outputs.artifact-url }}
          build-status: ${{ job.status }}
          manifest-install-log: ${{ github.workspace }}/build/vcpkg-manifest-install.log
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: 📦 Create SDK
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        run: |
          ${VCPKG_ROOT}/vcpkg export --zip --output-dir=./sdk --x-install-root=./build/vcpkg_installed  --x-manifest-root=vcpkg

      - name: 📤 Upload sdk
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: strata-sdk-${{ matrix.triplet }}
          path: |
            sdk/vcpkg-export-*.zip

      - name: 🌋 Build
        run: |
          # We make sure the target "all" is built before bundling
          # Ideally, we would specify each target that is required to be installed, but this workaround is sufficient for now
          cmake --build build
          cmake --build build --target bundle

      - name: Archive app
        run: |
          gtar -cpvzf strata-app-${{steps.workflow-artifact-ids.outputs.filename}}-${{ matrix.triplet }}.tar.gz ./build/_CPack_Packages/Darwin/External/*/*.app

      - name: 📤 Upload app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: strata-app-${{steps.workflow-artifact-ids.outputs.filename}}-${{ matrix.triplet }}
          path: |
            strata-app-${{steps.workflow-artifact-ids.outputs.filename}}-${{ matrix.triplet }}.tar.gz

  schedule_download_comment:
    name: Create dmg
    runs-on: macos-latest
    needs: build
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔨 Prepare build env
        run: |
          brew install create-dmg


      - name: 🎲 Get artifact ids
        id: workflow-artifact-ids
        uses: ./.github/actions/get-workflow-artifact-ids

      - name: 📤 Download app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: strata-app-${{steps.workflow-artifact-ids.outputs.filename}}-*
          path: |
            artifacts

      - name: Create universal app
        run: |
          # actions/download-artifact@v8 with a single-matching pattern places
          # the artifact contents directly under `path`, NOT in a per-artifact
          # subdir like older versions. Use find to locate both tarballs
          # regardless of layout.
          set -euo pipefail

          mkdir -p x64 arm64
          rm -rf universal
          ls -laR artifacts | head -80 || true

          X64_TARBALL=$(find artifacts -name 'strata-app-*-x64-osx-dynamic-release.tar.gz' -print -quit)
          ARM64_TARBALL=$(find artifacts -name 'strata-app-*-arm64-osx-dynamic-release.tar.gz' -print -quit)

          if [ -z "$X64_TARBALL" ]; then
            echo "ERROR: x64 app tarball not found under artifacts/"
            exit 1
          fi
          if [ -z "$ARM64_TARBALL" ]; then
            echo "ERROR: arm64 app tarball not found under artifacts/"
            exit 1
          fi

          echo "Extracting $X64_TARBALL to x64/"
          gtar --strip-components=5 -zxf "$X64_TARBALL" -C x64
          echo "Extracting $ARM64_TARBALL to arm64/"
          gtar --strip-components=5 -zxf "$ARM64_TARBALL" -C arm64

          pip install lipomerge
          lipomerge ./x64 ./arm64 universal

          APP_PATH=$(find universal -name '*.app' -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: universal .app bundle not found under universal/"
            find universal -print | head -50
            exit 1
          fi
          if [ "$(dirname "$APP_PATH")" != "universal" ]; then
            echo "Moving $APP_PATH to universal/"
            mv "$APP_PATH" universal/
          fi
          find universal -mindepth 1 -maxdepth 1 ! -name '*.app' -exec rm -rf {} +
          ls -la universal/*.app

      - name: 🔐 Import Apple code signing certificate
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v5.0.2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: 🧹 Materialize symlinks in Contents/MacOS #spellok
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          # Replace ALL symlinks under Contents/MacOS/ with real copies of #spellok
          # their targets, regardless of file type. Broken symlinks are
          # removed. We do this BEFORE Relocate/Sign so subsequent steps
          # only see regular files. Skipping non-Mach-O symlinks here was #spellok
          # the previous bug: e.g. gdal_translate is a symlink to a wrapper
          # that `file -bL` does not classify as Mach-O, so it stayed as a #spellok
          # symlink, then bypassed Relocate and Sign and left the bundle
          # with an unsigned subcomponent.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          MATERIALIZED=0
          REMOVED=0
          while IFS= read -r -d '' f; do
            if [ ! -e "$f" ]; then
              echo "Removing broken symlink $f"
              rm -f "$f"
              REMOVED=$((REMOVED + 1))
              continue
            fi
            tmp="${f}.codesign"
            cp -pL "$f" "$tmp"
            rm "$f"
            mv "$tmp" "$f"
            chmod +x "$f" 2>/dev/null || true
            MATERIALIZED=$((MATERIALIZED + 1))
            echo "Materialized $(basename "$f")"
          done < <(find "${APP_PATH}/Contents/MacOS" -maxdepth 1 -type l -print0)
          echo "Materialized ${MATERIALIZED} symlink(s); removed ${REMOVED} broken symlink(s)."

      - name: 🧹 Remove build metadata from app bundle
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          # Qt plugin builds can leave intermediate metadata under Contents/PlugIns.
          # These are not runtime files and make codesign reject the bundle seal.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          find "${APP_PATH}" -type d -name "objects-*" -print -prune -exec rm -rf {} +
          find "${APP_PATH}" -type f -name "*.o" -print -delete
          find "${APP_PATH}" -type f -name "*.a" -print -delete
          find "${APP_PATH}" -type f -name "*.prl" -print -delete

      - name: 🚚 Move Frameworks/lib out of Frameworks #spellok
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          # codesign treats every sub-directory of Contents/Frameworks/ as a
          # potential nested bundle. lib/python3.12/ does NOT have a valid
          # framework layout, so the bundle seal aborts with
          # "bundle format unrecognized". We move lib/ under Resources/ and
          # leave a relative symlink at Contents/Frameworks/lib so all
          # runtime paths (rpath, PYTHONHOME, dlopen) keep resolving.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          LIB_DIR="${APP_PATH}/Contents/Frameworks/lib"
          RES_DIR="${APP_PATH}/Contents/Resources/python_runtime"
          if [ -d "${LIB_DIR}" ] && [ ! -L "${LIB_DIR}" ]; then
            mkdir -p "${RES_DIR}"
            mv "${LIB_DIR}" "${RES_DIR}/lib"
            ln -s "../Resources/python_runtime/lib" "${LIB_DIR}"
            echo "Moved Frameworks/lib -> Resources/python_runtime/lib (symlinked back)"
            ls -la "${APP_PATH}/Contents/Frameworks/lib"
          else
            echo "Frameworks/lib not present or already a symlink, skipping."
          fi

      - name: 🧹 Remove broken symlinks from app bundle
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          # The merged universal bundle can contain optional dependency symlinks
          # from one architecture that are absent in the other. Broken symlinks
          # make `codesign --verify --strict` fail with a generic
          # "No such file or directory" against the top-level .app.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          REMOVED=0
          while IFS= read -r -d '' link; do
            if [ ! -e "$link" ]; then
              echo "Removing broken symlink $link -> $(readlink "$link")"
              rm -f "$link"
              REMOVED=$((REMOVED + 1))
            fi
          done < <(find "${APP_PATH}" -type l -print0)
          echo "Removed ${REMOVED} broken symlink(s)."

      - name: 🔏 Sign app
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          # Sign inside-out: every Mach-O binary, then nested bundles #spellok
          # (.framework, sub-.app), then the outer .app last. We avoid
          # `codesign --deep` because it recurses into directories that aren't
          # real bundles (e.g. Contents/Frameworks/lib/python3.12, the Python
          # stdlib) and rejects them with "bundle format unrecognized".
          # --options runtime enables the hardened runtime required for notarization.
          set -uo pipefail
          APP_PATH=$(ls -d universal/*.app | head -n1)
          APP_NAME=$(basename "${APP_PATH}" .app)
          MAIN_EXEC="${APP_PATH}/Contents/MacOS/${APP_NAME}"
          DEST="${APP_PATH}/Contents/Resources/python"
          mkdir -p "${DEST}"
          echo "Signing ${APP_PATH} (main executable: ${MAIN_EXEC})..."

          # Try to sign $1; if codesign refuses because the file is not a
          # signable Mach-O / bundle (script, data, ...), relocate it under #spellok
          # Resources/python/ so it does not break the outer bundle seal.
          sign_or_move() {
            local f="$1"
            local err
            err=$(codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "$f" 2>&1)
            local rc=$?
            if [ "$rc" -eq 0 ]; then
              return 0
            fi
            if echo "$err" | grep -qE 'is not (a|recognized as) (Mach-O|bundle|signable|valid)|unsupported format|file not in any of the requested architectures|invalid Info.plist|cannot find executable|bundle format unrecognized|the file is empty'; then #spellok
              echo "Not signable, moving out of MacOS/: $f"
              echo "  reason: $err"
              mv "$f" "${DEST}/" || rm -f "$f"
              return 0
            fi
            echo "ERROR signing $f: $err" >&2
            return "$rc"
          }

          # 1. Sign-or-move every regular file directly under Contents/MacOS/,
          #    EXCEPT the main executable. codesign on the main executable
          #    would try to seal the whole .app and demand that every other
          #    component is already signed, which we have not done yet.
          declare -a MACOS_ENTRIES=()
          while IFS= read -r -d '' f; do
            if [ "$f" = "$MAIN_EXEC" ]; then
              continue
            fi
            MACOS_ENTRIES+=("$f")
          done < <(find "${APP_PATH}/Contents/MacOS" -maxdepth 1 -type f -print0)
          for f in "${MACOS_ENTRIES[@]}"; do
            sign_or_move "$f" || exit 1
          done

          # 2. Sign every Mach-O file elsewhere in the bundle #spellok
          #    (libs, plugins, .so).
          declare -a OTHER_ENTRIES=()
          while IFS= read -r -d '' f; do
            OTHER_ENTRIES+=("$f")
          done < <(find "${APP_PATH}" -path "${APP_PATH}/Contents/MacOS" -prune -o \
                   \( -type f -o -type l \) -print0)
          for f in "${OTHER_ENTRIES[@]}"; do
            [ -z "$f" ] && continue
            if file -bL "$f" 2>/dev/null | grep -qE 'Mach-O'; then #spellok
              codesign --force --options runtime --timestamp \
                --sign "${MACOS_DEVELOPER_ID}" "$f" || exit 1
            fi
          done

          # 3. Sign each nested bundle wrapper (frameworks, sub-apps).
          while IFS= read -r b; do
            codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "$b" || exit 1
          done < <(find "${APP_PATH}" \( -name "*.framework" -o -name "*.app" \) \
                   -type d -not -path "${APP_PATH}")

          # 4. Sign the main executable now that all sibling components in
          #    Contents/MacOS/ are already signed or relocated.
          if [ -f "${MAIN_EXEC}" ]; then
            codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "${MAIN_EXEC}"
          fi

          # 5. Seal the top-level .app.
          codesign --force --options runtime --timestamp \
            --sign "${MACOS_DEVELOPER_ID}" "${APP_PATH}"

          echo "Verifying signature..."
          codesign -dvv "${APP_PATH}" 2>&1 | head -10
          # No --deep: it would retrigger the python3.12 bundle-format error.
          codesign --verify --strict --verbose=2 "${APP_PATH}"
        env:
          MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}

      - name: 🐍 Verify PyQGIS runtime in signed app
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          APP_PATH=$(ls -d universal/*.app | head -n1)
          python3 scripts/ci/verify_pyqgis_bundle.py --platform macos "${APP_PATH}"

      - name: Create dmg
        run: |
          if [[ "${IS_STRATA_RELEASE}" == "true" ]]; then
            QGIS_APP_NAME="Strata"
          else
            QGIS_APP_NAME="Strata-${STEPS_WORKFLOW_ARTIFACT_IDS_OUTPUTS_DISPLAY_NAME}"
          fi
          create-dmg --volname "${QGIS_APP_NAME} Installer" \
            --hide-extension "${QGIS_APP_NAME}.app" \
            --volicon "$(pwd)/images/icons/mac/strata.icns" \
            --background "$(pwd)/platform/macos/installer_background.png" \
            --window-pos 200 120 \
            --window-size 512 320 \
            --icon-size 100 \
            --icon "${QGIS_APP_NAME}.app" 130 160 \
            --app-drop-link 400 155 \
            "${QGIS_APP_NAME}-Installer.dmg" \
            universal/*.app
        env:
          STEPS_WORKFLOW_ARTIFACT_IDS_OUTPUTS_DISPLAY_NAME: ${{steps.workflow-artifact-ids.outputs.display-name}}

      - name: 📤 Upload app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact-mac-qt6
        with:
          name: strata-${{steps.workflow-artifact-ids.outputs.filename}}-dmg
          path: |
            *.dmg

      - name: 🔏 Notarize and staple DMG
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: |
          DMG_FILE=$(ls *.dmg | head -n1)
          echo "Notarizing ${DMG_FILE}..."
          xcrun notarytool submit "${DMG_FILE}" \
            --apple-id "${{ secrets.MACOS_APPLE_ID }}" \
            --team-id "${{ secrets.MACOS_APPLE_TEAM_ID }}" \
            --password "${{ secrets.MACOS_APPLE_APP_PASSWORD }}" \
            --wait
          echo "Stapling ticket (with retries — Apple's notary backend can be flaky)..."
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "${DMG_FILE}"; then
              echo "Stapled on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "WARN: stapler failed after 5 attempts. DMG is signed and notarized but ticket"
              echo "      is not stapled. Gatekeeper will fetch the ticket online on first launch."
              exit 0
            fi
            echo "  attempt ${attempt} failed, sleeping 30s..."
            sleep 30
          done
          xcrun stapler validate "${DMG_FILE}" || echo "WARN: stapler validate failed but ticket should still be online"

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || env.IS_STRATA_RELEASE == 'true' }}
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: '*.dmg'

      - name: Schedule download comment
        uses: ./.github/actions/post_sticky_comment
        if: github.event_name == 'pull_request'
        with:
          marker: macos-qt6
          body: |
            ### 🍎 MacOS Qt6 builds
            Download [MacOS Qt6 builds of this PR for testing](${{ steps.artifact-mac-qt6.outputs.artifact-url }}).
            _This app is not notarized, run `sudo xattr -d com.apple.quarantine /Applications/Strata.app` to avoid the warning_
            *(Built from commit ${{ github.event.pull_request.head.sha }})*
          pr: ${{ github.event.number }}
