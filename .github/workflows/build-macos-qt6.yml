---
name: 🍎 Build - MacOS Qt6
on:
  push:
    branches:
      - master
      - release-*
    tags:
      - 'qgisai-v*'
  pull_request:
  release:
    types: ['published']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            triplet: x64-osx-dynamic-release
            deployment-target: "10.15"
            osx-architecture: "x86_64"
          - os: macos-15
            triplet: arm64-osx-dynamic-release
            deployment-target: "11.0"
            osx-architecture: "arm64"
    name: build (macos)
    runs-on: ${{ matrix.os }}
    env:
      FC: gfortran
      GCC_VERSION: 15
      # Use the default vcpkg NuGet binary cache for all builds, including
      # tags. Disabling it ('clear') previously caused tag builds to hit the
      # GitHub Actions 6h job timeout because every dependency had to rebuild
      # from source. The cmake configure step already swallows 409 conflicts
      # via '|| true' when re-pushing already-existing packages.

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f # latest
        with:
          # Pin to specific version to avoid rebuilding too often
          # Also helps to avoid spurious build failures like https://github.com/qgis/QGIS/pull/47098
          cmakeVersion: 3.30.4

      - name: 🎡 Setup vcpkg
        id: setup-vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: 🎲 Get artifact ids
        id: workflow-artifact-ids
        uses: ./.github/actions/get-workflow-artifact-ids

      - name: 🔨 Prepare build env
        run: |
          brew install automake bison flex gnu-sed autoconf-archive nasm libtool fdupes swig mono
          echo $(brew --prefix bison)/bin >> $GITHUB_PATH
          echo $(brew --prefix flex)/bin >> $GITHUB_PATH
          echo $(brew --prefix libtool)/bin >> $GITHUB_PATH

      - name: Symlink gfortran (macOS)
        if: matrix.os == 'macos-15'
        run: |
          # make sure gfortran is available
          # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
          # https://github.com/actions/runner-images/issues/3371
          sudo ln -fs /opt/homebrew/bin/gfortran-${GCC_VERSION} /usr/local/bin/gfortran
          sudo mkdir -p /usr/local/gfortran
          sudo ln -sf /opt/homebrew/Cellar/gcc@${GCC_VERSION}/*/lib/gcc/${GCC_VERSION} /usr/local/gfortran/lib

      - name: Symlink gfortran (macOS-intel)
        if: matrix.os == 'macos-15-intel'
        run: |
          # make sure gfortran is available
          # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
          # https://github.com/actions/runner-images/issues/3371
          sudo ln -fs /usr/local/bin/gfortran-${GCC_VERSION} /usr/local/bin/gfortran
          sudo mkdir -p /usr/local/gfortran
          sudo ln -sf /usr/local/Cellar/gcc@${GCC_VERSION}/*/lib/gcc/${GCC_VERSION} /usr/local/gfortran/lib

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: 🍭 Setup XCode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: 🔐 Import Apple code signing certificate
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v5.0.2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce  # v1.2.22
        with:
          max-size: 500M
          key: build-ccache-${{ matrix.triplet }}-qt6-${{ github.event.pull_request.base.ref || github.ref_name }}
          save: ${{ github.event_name == 'push' }}

      - name: 🛍️ Tune ccache configuration
        shell: bash
        run: |
          # To make ccache work properly with precompiled headers
          ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🌱 Install dependencies and generate project files
        env:
          X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
        run: |
          echo "VCPKG_ROOT: ${VCPKG_ROOT}"

          # vcpkg's qca port does not ship the qcatool binary; QGIS' QCAMacros
          # otherwise insists on it (FATAL_ERROR) which aborts the build.
          # Soften the requirement: skip the FATAL by passing 0 to FIND_QCATOOL.
          # Patch is applied on the runner only — repo file stays untouched.
          sed -i '' 's|FIND_QCATOOL(1)|FIND_QCATOOL(0)|g' cmake/QCAMacros.cmake

          # Install first only with binarycaching, then deduplicate binaries and replace copies with symlinks.
          # Nuget doesn't understand the symlink concept
          cmake -S . \
                -G Ninja \
                -B build \
                -D QGIS_APP_NAME="${{ startsWith(github.ref, 'refs/tags/qgisai-v') && 'QGIS_AI' || format('QGIS-{0}', steps.workflow-artifact-ids.outputs.display-name) }}" \
                -D WITH_VCPKG=ON \
                -D WITH_QTWEBENGINE=OFF \
                -D WITH_BINDINGS=ON \
                -D WITH_ORACLE=ON \
                -D WITH_GEOGRAPHICLIB=OFF \
                -D WITH_SFCGAL=ON \
                -D WITH_PROJ_DATA=ON \
                -D VCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
                -D VCPKG_HOST_TRIPLET="${{ matrix.triplet }}" \
                -D VCPKG_INSTALL_OPTIONS="--only-binarycaching" \
                -D CMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deployment-target }} \
                -D CMAKE_OSX_ARCHITECTURES=${{ matrix.osx-architecture }} \
                -D ENABLE_UNITY_BUILDS=ON \
                -D MACOS_CODE_SIGN_IDENTITY="${{ secrets.MACOS_DEVELOPER_ID }}" \
                -D "NUGET_USERNAME=${GITHUB_ACTOR}" \
                -D NUGET_SOURCE="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
                -D NUGET_TOKEN=${{ secrets.GITHUB_TOKEN }} || true

                fdupes -q -r -1 build/vcpkg_installed/${{ matrix.triplet }}/lib | grep -E '\.(so|dylib)' | while read line; do master=""; for file in ${line[*]}; do if  [[ "x${master}" == "x" ]]; then master=$file; else rm "${file}"; ln -s $(basename "${master}") "${file}"; fi; done; done

                cmake -D VCPKG_INSTALL_OPTIONS="" build

      - name: 📑 Upload vcpkg build logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: build-logs-${{ matrix.triplet }}
          path: |
            ${{ env.VCPKG_ROOT }}/buildtrees/**/*.log

      - name: 📦 Create SDK
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        run: |
          ${VCPKG_ROOT}/vcpkg export --zip --output-dir=./sdk --x-install-root=./build/vcpkg_installed  --x-manifest-root=vcpkg

      - name: 📤 Upload sdk
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: qgis-sdk-${{ matrix.triplet }}
          path: |
            sdk/vcpkg-export-*.zip

      - name: 🌋 Build
        run: |
          # We make sure the target "all" is built before bundling
          # Ideally, we would specify each target that is required to be installed, but this workaround is sufficient for now
          cmake --build build
          cmake --build build --target bundle

      - name: Archive app
        run: |
          gtar -cpvzf qgis-app-${{steps.workflow-artifact-ids.outputs.filename}}-${{ matrix.triplet }}.tar.gz ./build/_CPack_Packages/Darwin/External/*/*.app

      - name: 📤 Upload app
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: qgis-app-${{steps.workflow-artifact-ids.outputs.filename}}-${{ matrix.triplet }}
          path: |
            qgis-app-${{steps.workflow-artifact-ids.outputs.filename}}-${{ matrix.triplet }}.tar.gz

  schedule_download_comment:
    name: Create dmg
    runs-on: macos-latest
    needs: build
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔨 Prepare build env
        run: |
          brew install create-dmg


      - name: 🎲 Get artifact ids
        id: workflow-artifact-ids
        uses: ./.github/actions/get-workflow-artifact-ids

      - name: 📤 Download app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: qgis-app-${{steps.workflow-artifact-ids.outputs.filename}}-*
          path: |
            artifacts

      - name: Create universal app
        run: |
          # actions/download-artifact@v8 with a single-matching pattern places
          # the artifact contents directly under `path`, NOT in a per-artifact
          # subdir like older versions. Use find to locate both tarballs
          # regardless of layout.
          set -euo pipefail

          mkdir -p x64 arm64
          rm -rf universal
          ls -laR artifacts | head -80 || true

          X64_TARBALL=$(find artifacts -name 'qgis-app-*-x64-osx-dynamic-release.tar.gz' -print -quit)
          ARM64_TARBALL=$(find artifacts -name 'qgis-app-*-arm64-osx-dynamic-release.tar.gz' -print -quit)

          if [ -z "$X64_TARBALL" ]; then
            echo "ERROR: x64 app tarball not found under artifacts/"
            exit 1
          fi
          if [ -z "$ARM64_TARBALL" ]; then
            echo "ERROR: arm64 app tarball not found under artifacts/"
            exit 1
          fi

          echo "Extracting $X64_TARBALL to x64/"
          gtar --strip-components=5 -zxf "$X64_TARBALL" -C x64
          echo "Extracting $ARM64_TARBALL to arm64/"
          gtar --strip-components=5 -zxf "$ARM64_TARBALL" -C arm64

          pip install lipomerge
          lipomerge ./x64 ./arm64 universal

          APP_PATH=$(find universal -name '*.app' -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: universal .app bundle not found under universal/"
            find universal -print | head -50
            exit 1
          fi
          if [ "$(dirname "$APP_PATH")" != "universal" ]; then
            echo "Moving $APP_PATH to universal/"
            mv "$APP_PATH" universal/
          fi
          find universal -mindepth 1 -maxdepth 1 ! -name '*.app' -exec rm -rf {} +
          ls -la universal/*.app

      - name: 🔐 Import Apple code signing certificate
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        uses: apple-actions/import-codesign-certs@8f3fb608891dd2244cdab3d69cd68c0d37a7fe93 # v5.0.2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: 🧹 Relocate non-Mach-O files out of Contents/MacOS #spellok
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        run: |
          # macOS bundles require Contents/MacOS/ to contain only Mach-O #spellok
          # binaries. pymacdeployqt copies GDAL Python utilities (gdal_calc.py,
          # gdal_polygonize, gdal_proximity.py, ...) into MacOS/, including
          # scripts without .py suffix. These make codesign abort with
          # "code object is not signed at all" when sealing the bundle.
          # Move them to Contents/Resources/python/ where codesign treats them
          # as resources. QGIS calls GDAL via C++ bindings, not these scripts,
          # so functionality is unaffected; advanced users invoking the CLI
          # utilities can still run them by full path under Resources/python/.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          DEST="${APP_PATH}/Contents/Resources/python"
          mkdir -p "${DEST}"
          MOVED=0
          while IFS= read -r -d '' f; do
            if file -bL "$f" | grep -qE 'Mach-O'; then #spellok
              continue
            fi
            mv "$f" "${DEST}/"
            MOVED=$((MOVED + 1))
          done < <(find "${APP_PATH}/Contents/MacOS" -maxdepth 1 \( -type f -o -type l \) -print0)
          echo "Relocated ${MOVED} non-Mach-O file(s) to Contents/Resources/python/" #spellok

      - name: 🧹 Remove build metadata from app bundle
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        run: |
          # Qt plugin builds can leave intermediate metadata under Contents/PlugIns.
          # These are not runtime files and make codesign reject the bundle seal.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          find "${APP_PATH}" -type d -name "objects-*" -print -prune -exec rm -rf {} +
          find "${APP_PATH}" -type f -name "*.o" -print -delete
          find "${APP_PATH}" -type f -name "*.a" -print -delete
          find "${APP_PATH}" -type f -name "*.prl" -print -delete

      - name: 🧹 Materialize symlinked Mach-O executables #spellok
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        run: |
          # Symlinked executables under Contents/MacOS can remain reported as
          # unsigned subcomponents after signing. Replace just these launch
          # helpers with real files before the inside-out signing pass.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          while IFS= read -r -d '' f; do
            if ! file -bL "$f" | grep -qE 'Mach-O'; then #spellok
              continue
            fi
            tmp="${f}.codesign"
            cp -pL "$f" "$tmp"
            rm "$f"
            mv "$tmp" "$f"
            chmod +x "$f"
            echo "Materialized $(basename "$f")"
          done < <(find "${APP_PATH}/Contents/MacOS" -maxdepth 1 -type l -print0)

      - name: 🔏 Sign app
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        run: |
          # Sign inside-out: every Mach-O binary, then nested bundles #spellok
          # (.framework, sub-.app), then the outer .app last. We avoid
          # `codesign --deep` because it recurses into directories that aren't
          # real bundles (e.g. Contents/Frameworks/lib/python3.12, the Python
          # stdlib) and rejects them with "bundle format unrecognized".
          # --options runtime enables the hardened runtime required for notarization.
          APP_PATH=$(ls -d universal/*.app | head -n1)
          echo "Signing ${APP_PATH} with ${MACOS_DEVELOPER_ID}..."

          sign_one() {
            codesign --force --options runtime --timestamp \
              --sign "${MACOS_DEVELOPER_ID}" "$1"
          }

          # 1. Sign every regular file under Contents/MacOS/ unconditionally. #spellok
          #    The Relocate step has already moved non-binaries elsewhere, so
          #    everything left here must be signed. We do NOT filter on
          #    `file -bL Mach-O` because it occasionally misclassifies
          #    universal binaries produced by lipomerge (e.g. gdal_translate),
          #    which then break the bundle seal with
          #    "code object is not signed at all".
          find "${APP_PATH}/Contents/MacOS" -maxdepth 1 -type f -print0 \
            | while IFS= read -r -d '' f; do
              sign_one "$f"
            done

          # 2. Sign every Mach-O file elsewhere in the bundle #spellok
          #    (libs, plugins, .so).
          find "${APP_PATH}" -path "${APP_PATH}/Contents/MacOS" -prune -o \
            \( -type f -o -type l \) -print0 \
            | while IFS= read -r -d '' f; do
              [ -z "$f" ] && continue
              if file -bL "$f" 2>/dev/null | grep -qE 'Mach-O'; then #spellok
                sign_one "$f"
              fi
            done

          # 3. Sign each nested bundle wrapper (frameworks, sub-apps).
          find "${APP_PATH}" \( -name "*.framework" -o -name "*.app" \) \
            -type d -not -path "${APP_PATH}" | while read -r b; do
            sign_one "$b"
          done

          # 4. Sign the top-level .app last.
          sign_one "${APP_PATH}"

          echo "Verifying signature..."
          codesign -dvv "${APP_PATH}" 2>&1 | head -10
          # No --deep: it would retrigger the python3.12 bundle-format error.
          codesign --verify --strict --verbose=2 "${APP_PATH}"
        env:
          MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}

      - name: Create dmg
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/qgisai-v* ]]; then
            QGIS_APP_NAME="QGIS_AI"
          else
            QGIS_APP_NAME="QGIS-${STEPS_WORKFLOW_ARTIFACT_IDS_OUTPUTS_DISPLAY_NAME}"
          fi
          create-dmg --volname "${QGIS_APP_NAME} Installer" \
            --hide-extension ${QGIS_APP_NAME}.app \
            --volicon "$(pwd)/images/icons/mac/qgis.icns" \
            --background "$(pwd)/platform/macos/installer_background.png" \
            --window-pos 200 120 \
            --window-size 512 320 \
            --icon-size 100 \
            --icon "${QGIS_APP_NAME}.app" 130 160 \
            --app-drop-link 400 155 \
            ${QGIS_APP_NAME}-Installer.dmg \
            universal/*.app
        env:
          STEPS_WORKFLOW_ARTIFACT_IDS_OUTPUTS_DISPLAY_NAME: ${{steps.workflow-artifact-ids.outputs.display-name}}

      - name: 📤 Upload app
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        id: artifact-mac-qt6
        with:
          name: qgis-${{steps.workflow-artifact-ids.outputs.filename}}-dmg
          path: |
            *.dmg

      - name: 🔏 Notarize and staple DMG
        if: ${{ startsWith(github.ref, 'refs/tags/qgisai-v') }}
        run: |
          DMG_FILE=$(ls *.dmg | head -n1)
          echo "Notarizing ${DMG_FILE}..."
          xcrun notarytool submit "${DMG_FILE}" \
            --apple-id "${{ secrets.MACOS_APPLE_ID }}" \
            --team-id "${{ secrets.MACOS_APPLE_TEAM_ID }}" \
            --password "${{ secrets.MACOS_APPLE_APP_PASSWORD }}" \
            --wait
          echo "Stapling ticket (with retries — Apple's notary backend can be flaky)..."
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "${DMG_FILE}"; then
              echo "Stapled on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "WARN: stapler failed after 5 attempts. DMG is signed and notarized but ticket"
              echo "      is not stapled. Gatekeeper will fetch the ticket online on first launch."
              exit 0
            fi
            echo "  attempt ${attempt} failed, sleeping 30s..."
            sleep 30
          done
          xcrun stapler validate "${DMG_FILE}" || echo "WARN: stapler validate failed but ticket should still be online"

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/qgisai-v') }}
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          files: '*.dmg'

      - name: Schedule download comment
        uses: ./.github/actions/post_sticky_comment
        if: github.event_name == 'pull_request'
        with:
          marker: macos-qt6
          body: |
            ### 🍎 MacOS Qt6 builds
            Download [MacOS Qt6 builds of this PR for testing](${{ steps.artifact-mac-qt6.outputs.artifact-url }}).
            _This app is not notarized, run `sudo xattr -d com.apple.quarantine /Applications/QGIS*.app` to avoid the warning_
            *(Built from commit ${{ github.event.pull_request.head.sha }})*
          pr: ${{ github.event.number }}
