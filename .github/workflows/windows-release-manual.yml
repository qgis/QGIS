---
name: 🪟 Windows Release Manual

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to upload Windows assets to
        required: true
      ref_to_build:
        description: Git ref/tag to build
        required: true
      sdk_run_id:
        description: Existing workflow run id containing qgis-sdk-x64-windows; leave empty to rebuild vcpkg
        required: false
        default: '26423962164'
      sdk_artifact_name:
        description: SDK artifact name to download
        required: false
        default: qgis-sdk-x64-windows

concurrency:
  group: windows-release-manual-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    name: build and upload Windows release asset
    runs-on: windows-2022
    timeout-minutes: 360
    env:
      IS_STRATA_RELEASE: ${{ startsWith(inputs.release_tag, 'strata-v') }}

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref_to_build }}
          fetch-depth: 2
          persist-credentials: false

      - name: 🔨 Uninstall system cmake
        shell: bash
        run: choco uninstall cmake.install

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f
        with:
          cmakeVersion: 3.31.6

      - name: 🧽 Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: 📥 Download Windows SDK
        if: ${{ inputs.sdk_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6.0.1
        with:
          name: ${{ inputs.sdk_artifact_name }}
          run-id: ${{ inputs.sdk_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: sdk-artifact

      - name: 📦 Extract Windows SDK
        if: ${{ inputs.sdk_run_id != '' }}
        shell: bash
        run: |
          mkdir -p sdk-root
          SDK_ZIP=$(find sdk-artifact -name 'vcpkg-export-*.zip' -print -quit)
          if [ -z "${SDK_ZIP}" ]; then
            echo "ERROR: vcpkg export zip not found in SDK artifact"
            find sdk-artifact -maxdepth 3 -type f -print
            exit 1
          fi
          7z x "${SDK_ZIP}" -osdk-root -y
          SDK_DIR=$(find sdk-root -mindepth 1 -maxdepth 1 -type d -name 'vcpkg-export-*' -print -quit)
          if [ -z "${SDK_DIR}" ]; then
            echo "ERROR: extracted SDK root not found"
            find sdk-root -maxdepth 3 -type d -print
            exit 1
          fi
          SDK_DIR_ABS=$(cd "${SDK_DIR}" && pwd -W)
          echo "WINDOWS_SDK_PATH=${SDK_DIR_ABS}" >> "${GITHUB_ENV}"

      - name: 🎡 Setup vcpkg
        if: ${{ inputs.sdk_run_id == '' }}
        uses: ./.github/actions/setup-vcpkg

      - name: 🦬 Setup flex/bison
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: lexxmark/winflexbison
          fileName: '*.zip'
          tag: v2.5.24
          extract: true

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2
        with:
          max-size: 2G
          key: build-ccache-win64-qt6-${{ inputs.release_tag }}
          save: true

      - name: 🛍️ Tune ccache configuration
        shell: bash
        run: |
          ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🪟 Install NSIS
        run: choco install nsis -y --no-progress
        shell: bash

      - name: 🔐 Azure login for Windows code signing
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔏 Prepare Windows code signing tools
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        shell: powershell
        env:
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERT_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
        run: .\scripts\ci\prepare-windows-signing.ps1

      - name: 🌱 Install dependencies and generate project files
        shell: bash
        env:
          X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          BUILD_DIR=$(cygpath "${{ github.workspace }}/build")
          SOURCE_DIR=$(cygpath "${{ github.workspace }}")

          APP_NAME_OPT=""
          NSIS_OPT=""
          if [[ "${RELEASE_TAG}" == strata-v* ]]; then
            APP_NAME_OPT="-DQGIS_APP_NAME=Strata"
            NSIS_OPT="-DCREATE_NSIS=TRUE"
            STRATA_VERSION_OPT="-DSTRATA_VERSION=${RELEASE_TAG#strata-v}"
            CODE_SIGN_OPT="-DSTRATA_WINDOWS_CODE_SIGN=ON"
          else
            STRATA_VERSION_OPT=""
            CODE_SIGN_OPT=""
          fi

          VCPKG_OPTS=(
                -D VCPKG_TARGET_TRIPLET=x64-windows-release
                -D VCPKG_HOST_TRIPLET=x64-windows-release
          )

          if [ -n "${WINDOWS_SDK_PATH:-}" ]; then
            VCPKG_OPTS+=(-D "SDK_PATH=${WINDOWS_SDK_PATH}")
          else
            VCPKG_OPTS+=(
                -D WITH_VCPKG=ON
                -D VCPKG_INSTALL_OPTIONS="--x-buildtrees-root=C:/src"
                -D NUGET_BINARY_SOURCE_MODE=readwrite
                -D "NUGET_USERNAME=${GITHUB_ACTOR}"
                -D NUGET_PUSH_SOURCE="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
                -D NUGET_TOKEN=${{ secrets.GITHUB_TOKEN }}
            )
          fi

          cmake -S "${SOURCE_DIR}" \
                -B "${BUILD_DIR}" \
                -G Ninja \
                -D CMAKE_BUILD_TYPE=Release \
                -D CREATE_ZIP=ON \
                ${NSIS_OPT} \
                ${APP_NAME_OPT} \
                ${STRATA_VERSION_OPT} \
                ${CODE_SIGN_OPT} \
                -D WITH_DESKTOP=ON \
                -D WITH_3D=ON \
                -D WITH_BINDINGS=ON \
                -D WITH_GEOGRAPHICLIB=OFF \
                -D WITH_SFCGAL=OFF \
                -D ENABLE_TESTS=OFF \
                -D USE_CCACHE=ON \
                -D ENABLE_UNITY_BUILDS=ON \
                -D FLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
                -D BISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe" \
                -D WITH_QTWEBENGINE=OFF \
                "${VCPKG_OPTS[@]}"

      - name: 🌋 Build
        shell: bash
        run: cmake --build "${{ github.workspace }}/build" --config Release

      - name: 📦 Package
        shell: bash
        run: cmake --build "${{ github.workspace }}/build" --target bundle --config Release

      - name: 🔎 Verify signed Windows release artifacts
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        shell: powershell
        run: |
          $files = @(Get-ChildItem -Path "${{ github.workspace }}\build" -File | Where-Object { $_.Name -like "*.exe" -or $_.Name -like "*-win64.zip" } | Select-Object -ExpandProperty FullName)
          if ($files.Count -eq 0) {
            throw "No Windows release artifacts found under build/."
          }
          .\scripts\ci\sign-windows-artifacts.ps1 -Mode package -PackageFiles $files -VerifyOnly

      - name: 📤 Upload bundle artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: strata-windows-${{ inputs.release_tag }}
          path: |
            build/*-win64.zip
            build/*.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            build/*-win64.zip
            build/*.exe

      - name: 📑 Upload dep build logs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-logs-windows-${{ inputs.release_tag }}
          path: |
            C:/src/**/*.log
