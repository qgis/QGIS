---
name: 📦 Vcpkg bump

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pull-requests: write

jobs:
  vcpkg-bump:
    runs-on: ubuntu-latest
    if: github.repository == 'qgis/QGIS'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

        with:
          persist-credentials: false

      - name: Resolve latest baselines
        id: baselines
        run: python3 scripts/bump_vcpkg_baselines.py vcpkg/vcpkg.json

      - name: Create pull request
        if: steps.baselines.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  #  v8.2.0
        with:
          branch: vcpkg-bumps/auto
          delete-branch: true
          commit-message: "Bump vcpkg baselines"
          title: "Bump vcpkg baselines"
          body: |
            Automated vcpkg baseline bump.

            ${{ steps.baselines.outputs.summary }}
