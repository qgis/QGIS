name: 🗺 OGC tests for QGIS Server

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - release-**
      - queued_ltr_backports
    paths:
    - 'src/core/**'
    - 'src/auth/**'
    - 'src/providers/**'
    - 'src/server/**'
    - 'src/CMakeLists.txt'
    - 'external/**'
    - 'CMakeLists.txt'
    - '.github/workflows/ogc.yml'
    - '.ci/ogc/**'
  pull_request:
    branches:
      - master
      - release-**
    paths:
    - 'src/core/**'
    - 'src/auth/**'
    - 'src/providers/**'
    - 'src/server/**'
    - 'src/CMakeLists.txt'
    - 'external/**'
    - 'CMakeLists.txt'
    - '.github/workflows/ogc.yml'
    - '.ci/ogc/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore build cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/QGIS/.ccache
          key: build-ccache-ogc-${{ github.event.pull_request.base.ref || github.ref_name }}
          restore-keys: |
            build-ccache-ogc-master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Container
        id: docker-build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          tags: qgis/qgis-deps-ogc:${{ github.event.pull_request.base.ref || github.ref_name }}
          context: .ci/ogc
          file: .ci/ogc/Dockerfile
          cache-from: type=registry,ref=ghcr.io/qgis/qgis-deps-ogc:buildcache
          #  Replace with ${{ github.event_name == 'push' && 'type=registry,ref=ghcr.io/qgis/qgis-deps-ogc:buildcache,mode=min' || '' }}
          cache-to: type=registry,ref=ghcr.io/qgis/qgis-deps-ogc:buildcache,mode=min
          load: true

      - name: Run build
        run: |
          docker run -v $(pwd):/usr/src/qgis -v /home/runner/QGIS/.ccache:/root/.ccache ${DOCKER_IMAGE} /usr/src/qgis/.ci/ogc/build.sh
        env:
          DOCKER_IMAGE: ${{ steps.docker-build.outputs.imageid }}

      - name: Save build cache for push only
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: ${{ github.event_name == 'push' }}
        with:
          path: /home/runner/QGIS/.ccache
          key: build-ccache-ogc-${{ github.ref_name }}-${{ github.run_id }}

      - name: Install pyogctest
        run: |
          sudo apt-get update && sudo apt-get install python3-virtualenv virtualenv
          # Re-enable below once https://github.com/rouault/pyogctest/tree/ogcapi_root is merged into upstream https://github.com/pblottiere/pyogctest
          # virtualenv -p /usr/bin/python3 venv && source venv/bin/activate && pip install pyogctest
          virtualenv -p /usr/bin/python3 venv && source venv/bin/activate && pip install git+https://github.com/rouault/pyogctest.git@ogcapi_root

      - name: Run WMS 1.3.0 OGC tests
        run: |
          source venv/bin/activate && pyogctest -s wms130 -e
          docker compose -f .ci/ogc/docker-compose.yml up -d
          source venv/bin/activate && pyogctest -n ogc_qgis -s wms130 -v -u http://$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' qgis_server_nginx)/qgisserver_wms130
        env:
          DOCKER_IMAGE: ${{ steps.docker-build.outputs.imageid }}

      - name: Run OGC API Features 1.0 tests
        run: |
          cd data && git clone https://github.com/qgis/QGIS-Training-Data && cd -
          docker compose -f .ci/ogc/docker-compose.yml up -d
          source venv/bin/activate && pyogctest -n ogc_qgis -s ogcapif --ogcapi-root /ogcapi -v -u http://$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' qgis_server_nginx)/qgisserver_ogcapif
        env:
          DOCKER_IMAGE: ${{ steps.docker-build.outputs.imageid }}
