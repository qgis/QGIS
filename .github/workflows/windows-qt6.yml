---
name: 🪟 Windows Qt6
on:
  push:
    branches:
      - master
      - release-**
    tags:
      - 'strata-v*'
  pull_request:
  release:
    types: ['published']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write

env:
  IS_STRATA_RELEASE: ${{ startsWith(github.ref, 'refs/tags/strata-v') || startsWith(github.event.release.tag_name, 'strata-v') }}
  USE_WINDOWS_SDK: ${{ startsWith(github.ref, 'refs/tags/strata-v') || startsWith(github.event.release.tag_name, 'strata-v') || github.event_name == 'push' }}
  WINDOWS_CODESIGN_CONFIGURED: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE_NAME != '' }}
  WINDOWS_RELEASE_SDK_RUN_ID: '26423962164'
  WINDOWS_RELEASE_SDK_ARTIFACT_NAME: qgis-sdk-x64-windows

jobs:
  build:
    name: build (windows)
    runs-on: windows-2022
    # See macOS workflow: keep vcpkg cache enabled for tag builds too. The
    # 6h job timeout (GitHub free tier) was being hit when caching was
    # disabled. cmake configure '|| true' swallows any 409 push conflicts.

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: 🔨 Uninstall system cmake
        shell: bash
        run: |
          choco uninstall cmake.install

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e
        with:
          cmakeVersion: 3.31.6

      - name: 🧽 Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 #v1

      - name: 📥 Download Windows SDK
        if: ${{ env.USE_WINDOWS_SDK == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6.0.1
        with:
          name: ${{ env.WINDOWS_RELEASE_SDK_ARTIFACT_NAME }}
          run-id: ${{ env.WINDOWS_RELEASE_SDK_RUN_ID }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: sdk-artifact

      - name: 📦 Extract Windows SDK
        if: ${{ env.USE_WINDOWS_SDK == 'true' }}
        shell: bash
        run: |
          mkdir -p sdk-root
          SDK_ZIP=$(find sdk-artifact -name 'vcpkg-export-*.zip' -print -quit)
          if [ -z "${SDK_ZIP}" ]; then
            echo "ERROR: vcpkg export zip not found in SDK artifact"
            find sdk-artifact -maxdepth 3 -type f -print
            exit 1
          fi
          7z x "${SDK_ZIP}" -osdk-root -y
          SDK_DIR=$(find sdk-root -mindepth 1 -maxdepth 1 -type d -name 'vcpkg-export-*' -print -quit)
          if [ -z "${SDK_DIR}" ]; then
            echo "ERROR: extracted SDK root not found"
            find sdk-root -maxdepth 3 -type d -print
            exit 1
          fi
          SDK_DIR_ABS=$(cd "${SDK_DIR}" && pwd -W)
          echo "WINDOWS_SDK_PATH=${SDK_DIR_ABS}" >> "${GITHUB_ENV}"

      - name: 🎡 Setup vcpkg
        if: ${{ env.USE_WINDOWS_SDK != 'true' }}
        uses: ./.github/actions/setup-vcpkg

      - name: 🦬 Setup flex/bison
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f #v1.13
        with:
          repository: 'lexxmark/winflexbison'
          fileName: '*.zip'
          tag: 'v2.5.24'
          extract: true

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 #v1.2
        with:
          max-size: 1G
          key: build-ccache-win64-qt6-${{ github.event.pull_request.base.ref || github.ref_name }}
          save: ${{ github.event_name == 'push' }}

      - name: 🛍️ Tune ccache configuration
        shell: bash
        run: |
          # To make ccache work properly with precompiled headers
          ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🪟 Install NSIS
        if: ${{ env.IS_STRATA_RELEASE == 'true' }}
        run: choco install nsis -y --no-progress
        shell: bash

      - name: 🔐 Azure login for Windows code signing
        if: ${{ env.IS_STRATA_RELEASE == 'true' && env.WINDOWS_CODESIGN_CONFIGURED == 'true' }}
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔏 Prepare Windows code signing tools
        if: ${{ env.IS_STRATA_RELEASE == 'true' && env.WINDOWS_CODESIGN_CONFIGURED == 'true' }}
        shell: powershell
        env:
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERT_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
        run: .\scripts\ci\prepare-windows-signing.ps1

      - name: ⚠️ Windows code signing not configured
        if: ${{ env.IS_STRATA_RELEASE == 'true' && env.WINDOWS_CODESIGN_CONFIGURED != 'true' }}
        shell: bash
        run: |
          echo "::warning::Windows code signing is disabled because Azure signing secrets/variables are not configured. Release assets will be uploaded unsigned."

      - name: 🌱 Install dependencies and generate project files
        id: cmake-configure
        shell: bash
        env:
          X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
        run: |
          BUILD_DIR=$( cygpath "${{ github.workspace }}/build" )
          SOURCE_DIR=$( cygpath "${{ github.workspace }}" )

          if [[ "${IS_STRATA_RELEASE}" == "true" ]]; then
            APP_NAME_OPT='-DQGIS_APP_NAME=Strata'
            NSIS_OPT='-DCREATE_NSIS=TRUE'
            if [[ "${{ github.event_name }}" == "release" ]]; then
              STRATA_TAG="${{ github.event.release.tag_name }}"
            else
              STRATA_TAG="${GITHUB_REF#refs/tags/}"
            fi
            STRATA_VERSION_OPT="-DSTRATA_VERSION=${STRATA_TAG#strata-v}"
            if [[ "${WINDOWS_CODESIGN_CONFIGURED}" == "true" ]]; then
              CODE_SIGN_OPT='-DSTRATA_WINDOWS_CODE_SIGN=ON'
            else
              CODE_SIGN_OPT=''
            fi
          else
            APP_NAME_OPT=''
            NSIS_OPT=''
            STRATA_VERSION_OPT=''
            CODE_SIGN_OPT=''
          fi

          VCPKG_OPTS=(
                -D VCPKG_TARGET_TRIPLET=x64-windows-release
                -D VCPKG_HOST_TRIPLET=x64-windows-release
          )

          if [ -n "${WINDOWS_SDK_PATH:-}" ]; then
            VCPKG_OPTS+=(-D "SDK_PATH=${WINDOWS_SDK_PATH}")
          else
            VCPKG_OPTS+=(
                -D WITH_VCPKG=ON
                -D VCPKG_INSTALL_OPTIONS="--x-buildtrees-root=C:/src"
                -D NUGET_BINARY_SOURCE_MODE=readwrite
                -D "NUGET_USERNAME=${GITHUB_ACTOR}"
                -D NUGET_PUSH_SOURCE="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
                -D NUGET_TOKEN=${{ secrets.GITHUB_TOKEN }}
            )
          fi

          cmake -S "${SOURCE_DIR}" \
                -B "${BUILD_DIR}" \
                -G Ninja \
                -D CMAKE_BUILD_TYPE=Release \
                -D CREATE_ZIP=ON \
                ${NSIS_OPT} \
                ${APP_NAME_OPT} \
                ${STRATA_VERSION_OPT} \
                ${CODE_SIGN_OPT} \
                -D WITH_DESKTOP=ON \
                -D WITH_3D=ON \
                -D WITH_BINDINGS=ON \
                -D WITH_GEOGRAPHICLIB=OFF \
                -D WITH_SFCGAL=OFF \
                -D ENABLE_TESTS=OFF \
                -D USE_CCACHE=ON \
                -D ENABLE_UNITY_BUILDS=ON \
                -D FLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
                -D BISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe" \
                -D USE_CCACHE=ON \
                -D WITH_QTWEBENGINE=OFF \
                "${VCPKG_OPTS[@]}"

      - name: 🌋 Build
        shell: bash
        run: |
          cmake --build "${{ github.workspace }}/build" --config Release

#      - uses: m-kuhn/action-tmate@patch-1
#        if: failure()

      - name: 📦 Package
        shell: bash
        run: |
          cmake --build "${{ github.workspace }}/build" --target bundle --config Release

      - name: 🔎 Verify signed Windows release artifacts
        if: ${{ env.IS_STRATA_RELEASE == 'true' && env.WINDOWS_CODESIGN_CONFIGURED == 'true' }}
        shell: powershell
        run: |
          $files = @(Get-ChildItem -Path "${{ github.workspace }}\build" -File | Where-Object { $_.Name -like "*.exe" -or $_.Name -like "*-win64.zip" } | Select-Object -ExpandProperty FullName)
          if ($files.Count -eq 0) {
            throw "No Windows release artifacts found under build/."
          }
          .\scripts\ci\sign-windows-artifacts.ps1 -Mode package -PackageFiles $files -VerifyOnly

      - name: 📦 Create SDK
        if: ${{ env.USE_WINDOWS_SDK != 'true' }}
#        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        run: |
          vcpkg.exe export --zip --output-dir=./sdk --x-install-root=./build/vcpkg_installed --x-manifest-root=vcpkg

      - name: 📤 Upload sdk
        if: ${{ env.USE_WINDOWS_SDK != 'true' }}
#        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1

        with:
          name: strata-sdk-x64-windows
          path: |
            sdk/vcpkg-export-*.zip

      - name: 📑 Upload dep build logs
        id: upload-build-logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1

        if: failure()
        with:
          name: build-logs-x64-windows
          path: |
            C:/src/**/*.log

      - name: 🧮 Report vcpkg build failures
        if: failure() && github.event_name == 'pull_request'
        uses: ./.github/actions/vcpkg_build_failures_report
        with:
          buildtrees-dir: C:/src
          triplet: x64-windows
          pr: ${{ github.event.number }}
          artifact-url: ${{ steps.upload-build-logs.outputs.artifact-url }}
          build-status: ${{ job.status }}
          manifest-install-log: ${{ github.workspace }}/build/vcpkg-manifest-install.log
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: 📤 Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1

        id: artifact-win64-qt6
        with:
          name: strata-windows-qt6
          path: |
            build/*-win64.zip
            build/*.exe

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || env.IS_STRATA_RELEASE == 'true' }}
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: |
            build/*-win64.zip
            build/*.exe

      - name: Schedule download comment
        uses: ./.github/actions/post_sticky_comment
        if: github.event_name == 'pull_request'
        with:
          marker: mingw64-qt6
          body: |
            ### 🪟 Windows Qt6 builds
            Download [Windows Qt6 builds of this PR for testing](${{ steps.artifact-win64-qt6.outputs.artifact-url }}).
            To execute locally, unzip the downloaded zip file and run `bin\qgis-bin.exe` in the extracted directory.
            You might be prompted by Windows Defender click "Run anyway"
            *(Built from commit ${{ github.event.pull_request.head.sha }})*
          pr: ${{ github.event.number }}
